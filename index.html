<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta charset="UTF-8">
<title>Benicio Poli Games</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#3a7bd5;
  text-align:center;
}

h1{
  color:white;
  font-size:26px;
  margin:10px;
}

.menu{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.menu button{
  padding:20px;
  font-size:22px;
  border:none;
  border-radius:15px;
}

#area{
  margin:10px;
  background:white;
  border-radius:20px;
  min-height:60vh;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  align-items:center;
  gap:15px;
  padding:10px;
}

.item, .shape{
  font-size:60px;
  width:100px;
  height:100px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.circle{border-radius:50%}
.rectangle{width:120px;height:80px}

.triangle{
  width:0;height:0;
  border-left:50px solid transparent;
  border-right:50px solid transparent;
  border-bottom:100px solid;
}

#feedback{color:white;font-size:22px}
#score{color:white;font-size:20px}
</style>
</head>

<body>

<h1>🎮 Benicio Poli Games</h1>

<div class="menu">
  <button onclick="cores()">🎨</button>
  <button onclick="numeros()">🔢</button>
  <button onclick="letras()">🔤</button>
  <button onclick="formas()">🔺</button>
  <button onclick="desafio()">🎯</button>
  <button onclick="idioma()">🌐</button>
</div>

<div id="score">Pontuação: 0</div>
<div id="feedback"></div>
<div id="area"></div>

<script>
let idiomaAtual='pt';
let pontos=0;
let resposta='';

const area=document.getElementById('area');
const feedback=document.getElementById('feedback');
const score=document.getElementById('score');

function falar(t){
  let msg=new SpeechSynthesisUtterance(t);
  msg.lang = idiomaAtual==='pt'?'pt-BR':'en-US';
  speechSynthesis.speak(msg);
}

function idioma(){
  idiomaAtual = idiomaAtual==='pt'?'en':'pt';
  falar(idiomaAtual==='pt'?'Português':'English');
}

function limpar(){
  area.innerHTML='';
  feedback.innerText='';
}

function cores(){
  limpar();
  const lista=[
    {pt:'vermelho',en:'red',c:'red'},
    {pt:'azul',en:'blue',c:'blue'},
    {pt:'verde',en:'green',c:'green'},
    {pt:'amarelo',en:'yellow',c:'yellow'},
    {pt:'roxo',en:'purple',c:'purple'},
    {pt:'laranja',en:'orange',c:'orange'},
    {pt:'rosa',en:'pink',c:'pink'}
  ];

  lista.forEach(x=>{
    let d=document.createElement('div');
    d.className='shape circle';
    d.style.background=x.c;
    d.onclick=()=>falar(idiomaAtual==='pt'?x.pt:x.en);
    area.appendChild(d);
  });
}

function numeros(){
  limpar();
  for(let i=0;i<=10;i++){
    let d=document.createElement('div');
    d.className='item';
    d.innerText=i;
    d.onclick=()=>falar(i);
    area.appendChild(d);
  }
}

function letras(){
  limpar();
  'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(l=>{
    let d=document.createElement('div');
    d.className='item';
    d.innerText=l;
    d.onclick=()=>falar(l);
    area.appendChild(d);
  });
}

function formas(){
  limpar();
  const lista=['circle','rectangle','triangle','star'];

  lista.forEach(f=>{
    let d=document.createElement('div');
    let cor=['red','blue','green','orange'][Math.floor(Math.random()*4)];

    if(f==='star'){ d.innerText='⭐'; d.className='item'; }
    else{
      d.className='shape '+f;
      if(f==='triangle') d.style.borderBottomColor=cor;
      else d.style.background=cor;
    }

    d.onclick=()=>falar(f);
    area.appendChild(d);
  });
}

function desafio(){
  limpar();
  const letras='ABCDE'.split('');
  resposta=letras[Math.floor(Math.random()*letras.length)];

  feedback.innerText=(idiomaAtual==='pt'?'Ache: ':'Find: ')+resposta;
  falar((idiomaAtual==='pt'?'Ache a letra ':'Find the letter ')+resposta);

  letras.forEach(l=>{
    let d=document.createElement('div');
    d.className='item';
    d.innerText=l;
    d.onclick=()=>verificar(l);
    area.appendChild(d);
  });
}

function verificar(v){
  if(v===resposta){
    pontos++;
    score.innerText=(idiomaAtual==='pt'?'Pontuação: ':'Score: ')+pontos;
    feedback.innerText=idiomaAtual==='pt'?'✔️ Muito bem Benício':'✔️ Great job';
    falar(idiomaAtual==='pt'?'Muito bem Benício':'Great job');
  }else{
    feedback.innerText=idiomaAtual==='pt'?'❌ Tente novamente, Bê':'❌ Try again';
    falar(idiomaAtual==='pt'?'Tente novamente Bê':'Try again');
  }
}
</script>

</body>
</html>
